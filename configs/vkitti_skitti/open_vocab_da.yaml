MODEL_2D:
  TYPE: "ViT-L-14"
  DUAL_HEAD: True
  OPEN_VOCAB: True
  NUM_CLASSES: 7
  CLASS_NAMES: ("vegetation terrain", "building", "road", "traffic object", "vehicle", "truck", "car")
  BASE_CLASS_IDX: (0, 1, 2, 3, 4)
  NOVEL_CLASS_IDX: (5, 6)
  TEXT_PROMPTS: ("a photo of a {}", "a lidar scene with {}", "a driving scene with {}")
  LOGIT_SCALE: 30.0
  INFER_DROP_CLASS_IDX: (4,)
MODEL_3D:
  TYPE: "SCN"
  DUAL_HEAD: True
  OPEN_VOCAB: True
  NUM_CLASSES: 7
  CLASS_NAMES: ("vegetation terrain", "building", "road", "traffic object", "vehicle", "truck", "car")
  BASE_CLASS_IDX: (0, 1, 2, 3, 4)
  NOVEL_CLASS_IDX: (5, 6)
  TEXT_PROMPTS: ("a photo of a {}", "a lidar scene with {}", "a driving scene with {}")
  LOGIT_SCALE: 30.0
  INFER_DROP_CLASS_IDX: (4,)
DATASET_SOURCE:
  TYPE: "VirtualKITTISCN"
  TRAIN: ("train",)
  VirtualKITTISCN:
    preprocess_dir: '/home/zhangshuai/Sysu_4T/houych/VirtualKITTI/preprocess'
    virtual_kitti_dir: '/home/zhangshuai/Sysu_4T/houych/VirtualKITTI'
    merge_classes_style: "GLOBAL_OV_VEHICLE"
    train_on_base_only: True
    base_class_indices: (0, 1, 2, 3, 4)
DATASET_TARGET:
  TYPE: "SemanticKITTISCN"
  TRAIN: ("train",)
  VAL: ("val",)
  TEST: ("test",)
  SemanticKITTISCN:
    preprocess_dir: '/home/zhangshuai/Sysu_4T/houych/SemanticKITTI/preprocess'
    semantic_kitti_dir: '/home/zhangshuai/Sysu_4T/houych/SemanticKITTI'
    merge_classes_style: "GLOBAL_OV_VEHICLE"
DATALOADER:
  NUM_WORKERS: 4
OPTIMIZER:
  TYPE: "Adam"
  BASE_LR: 0.001
SCHEDULER:
  TYPE: "MultiStepLR"
  MultiStepLR:
    gamma: 0.1
    milestones: (48000, 56000)
  MAX_ITERATION: 60000
TRAIN:
  BATCH_SIZE: 4
  SUMMARY_PERIOD: 50
  CHECKPOINT_PERIOD: 4000
  CLASS_WEIGHTS: []
  XMUDA:
    lambda_xm_src: 0.1
    lambda_xm_trg: 0.01
VAL:
  BATCH_SIZE: 1
  PERIOD: 3000

OUTPUT_DIR: "/home/zhangshuai/Sysu_4T/houych/OP/output_vkitti_skitti_ov"
